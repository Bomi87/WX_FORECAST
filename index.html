<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule Weather Analysis</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f3f5f7;
      color: #111;
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    .top {
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: #555;
    }

    .controls {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
      border: 1px solid #ccc;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      font-weight: bold;
    }

    select,
    button {
      height: 34px;
      padding: 0 12px;
      font-size: 14px;
      border: 1px solid #999;
      background: #fff;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #eee;
    }

    .status {
      margin: 10px 0 14px;
      font-size: 13px;
      color: #444;
    }

    .result {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .set-card {
      background: #fff;
      border: 1px solid #aaa;
      padding: 12px;
    }

    .set-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .set-no {
      font-size: 17px;
      font-weight: bold;
    }

    .aircraft {
      margin-left: 8px;
      padding: 2px 7px;
      border: 1px solid #888;
      font-size: 12px;
      font-weight: bold;
      background: #fafafa;
    }

    .schedule-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .schedule-box > div {
      padding: 8px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .label {
      display: inline-block;
      min-width: 44px;
      font-weight: bold;
      color: #333;
    }

    .forecast-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 120px;
      align-items: start;
    }

    .wx-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
      background: #fff;
    }

    .wx-table th,
    .wx-table td {
      border: 1px solid #000;
      padding: 4px 6px;
      height: 24px;
      text-align: center;
      vertical-align: middle;
    }

    .wx-table thead th {
      font-weight: bold;
      background: #f8f8f8;
    }

    .wx-table tbody th {
      width: 52%;
      font-weight: normal;
    }

    .airport-cell {
      width: 52%;
    }

    .airport {
      font-size: 16px;
      font-weight: bold;
    }

    .type {
      margin-top: 2px;
      font-size: 12px;
      color: #555;
    }

    .rounded {
      margin-top: 2px;
      font-size: 11px;
      color: #666;
    }

    .caution {
      color: #d98200;
      font-weight: bold;
    }

    .danger {
      color: red;
      font-weight: bold;
    }

    .error-box {
      padding: 12px;
      border: 1px solid #ff9999;
      background: #fff0f0;
      color: #b00000;
    }

    .empty-box {
      padding: 12px;
      border: 1px solid #ddd;
      background: #fff;
      color: #555;
    }

    @media (max-width: 900px) {
      .controls {
        flex-wrap: wrap;
      }

      .schedule-box {
        grid-template-columns: 1fr;
      }

      .forecast-pair {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .set-header {
        display: block;
      }

      .wx-table {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="top">
      <h1>Schedule Weather Analysis</h1>
      <p class="subtitle">priority order: ECMWF → GFS → ICON.</p>
    </header>

    <section class="controls">
      <label class="control-group">
        Aircraft
        <select id="aircraftSelect">
          <option value="ACJ">ACJ</option>
          <option value="G650">G650</option>
        </select>
      </label>

      <button id="loadBtn">조회</button>
      <button id="refreshBtn">새로고침</button>
    </section>

    <section id="status" class="status">대기 중</section>

    <main id="result" class="result"></main>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx7o_tLvIskYeT2hag4yT0sdY2g8DTvHBoMCBNYXxZ3Xv5UA8Z9wroQhGAIGKXprXrpFw/exec";

    const WEATHER_ROWS = [
      "Wind",
      "Cloud_cover_low(%)",
      "Temperature",
      "Dew_point",
      "Precipitation_probability(%)",
      "Precipitation(mm/hr)",
      "Rain(mm/hr)",
      "Snowfall(cm/hr)",
      "Weather_code",
      "Visibility(m)"
    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("loadBtn").addEventListener("click", loadForecast);
      document.getElementById("refreshBtn").addEventListener("click", loadForecast);

      loadForecast();
    });

    async function loadForecast() {
      const aircraft = document.getElementById("aircraftSelect").value;
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      status.textContent = "조회 중...";
      result.innerHTML = "";

      try {
        const url =
          `${GAS_URL}?action=timelineForecast&aircraft=${encodeURIComponent(aircraft)}&t=${Date.now()}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "조회 실패");
        }

        renderSets(data.sets || []);

        status.textContent =
          `${data.aircraft} / ${data.sets.length} SET 조회 완료 / Generated UTC ${data.generatedAtUtc}`;

      } catch (err) {
        status.textContent = "오류 발생";
        result.innerHTML = `
          <div class="error-box">
            ${escapeHtml(err.message)}
          </div>
        `;
      }
    }

    function renderSets(sets) {
      const result = document.getElementById("result");

      if (!sets.length) {
        result.innerHTML = `<div class="empty-box">표시할 스케줄이 없습니다.</div>`;
        return;
      }

      result.innerHTML = sets.map(renderSet).join("");
    }

    function renderSet(set) {
      return `
        <section class="set-card">
          <div class="set-header">
            <div>
              <span class="set-no">SET ${set.setNo}</span>
              <span class="aircraft">${escapeHtml(set.aircraft)}</span>
            </div>
          </div>

          <div class="schedule-box">
            <div>
              <span class="label">Local</span>
              ${escapeHtml(set.localScheduleText)}
            </div>
            <div>
              <span class="label">UTC</span>
              ${escapeHtml(set.utcScheduleText)}
            </div>
          </div>

          <div class="forecast-pair">
            ${renderWeatherTable("DEP", set.dep)}
            ${renderWeatherTable("ARR", set.arr)}
          </div>
        </section>
      `;
    }

    function renderWeatherTable(type, item) {
      const forecast = item.forecast || {};
      const display = forecast.display || {};

      const timeText = `${item.localDate} ${item.localTime}`;
      const roundedText = `${forecast.roundedLocalDate || ""} ${forecast.roundedLocalTime || ""}`;

      const rows = WEATHER_ROWS.map(key => {
        const value = display[key] ?? "-";
        const cls = getValueClass(key, value);

        return `
          <tr>
            <th>${escapeHtml(key)}</th>
            <td class="${cls}">${escapeHtml(value)}</td>
          </tr>
        `;
      }).join("");

      return `
        <table class="wx-table">
          <thead>
            <tr>
              <th class="airport-cell">
                <div class="airport">${escapeHtml(item.airport)}</div>
                <div class="type">${escapeHtml(type)}</div>
              </th>
              <th>
                <div>${escapeHtml(timeText)}</div>
                <div class="rounded">Rounded: ${escapeHtml(roundedText)}</div>
              </th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    function getValueClass(key, value) {
      const text = String(value || "");

      if (key === "Wind") {
        const wind = parseWind(text);
        const steady = wind.steady;
        const gust = wind.gust;

        // 빨간색:
        // steady 20KT 이상 또는 gust 25KT 이상
        if (steady >= 20 || gust >= 25) return "danger";

        // 주황색:
        // steady 15KT 이상 20KT 미만 또는 gust 20KT 이상 25KT 미만
        if ((steady >= 15 && steady < 20) || (gust >= 20 && gust < 25)) {
          return "caution";
        }

        return "";
      }

      if (key === "Cloud_cover_low(%)") {
        const n = parseFloat(text);
        if (n >= 80) return "caution";
        return "";
      }

      if (key === "Precipitation_probability(%)") {
        const n = parseFloat(text);
        if (n >= 60) return "danger";
        if (n >= 40) return "caution";
        return "";
      }

      if (key === "Precipitation(mm/hr)" || key === "Rain(mm/hr)") {
        const n = parseFloat(text);
        if (n >= 0.3) return "danger";
        if (n > 0) return "caution";
        return "";
      }

      if (key === "Weather_code") {
        const dangerWords = ["뇌전", "뇌우", "눈", "동결비", "강한", "안개"];

        if (dangerWords.some(word => text.includes(word))) {
          return "danger";
        }

        return "";
      }

      if (key === "Visibility(m)") {
        const n = parseFloat(text);
        if (n > 0 && n < 5000) return "danger";
        if (n >= 5000 && n < 8000) return "caution";
        return "";
      }

      return "";
    }

    function parseWind(windText) {
      const text = String(windText || "").trim();

      // 예:
      // 004/03G10KT → steady 3, gust 10
      // 350/08G15KT → steady 8, gust 15
      // 034/05KT    → steady 5, gust 0
      const m = text.match(/^\d{3}\/(\d{2,3})(?:G(\d{2,3}))?KT$/);

      if (!m) {
        return {
          steady: 0,
          gust: 0
        };
      }

      return {
        steady: Number(m[1] || 0),
        gust: Number(m[2] || 0)
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
